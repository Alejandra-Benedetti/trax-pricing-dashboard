<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eficacia | TraxPricing Vision Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --eficacia-azul: #0055A4; --eficacia-celeste: #4A90E2; }
        body { background-color: #F8FAFC; color: #1E293B; font-family: 'Inter', sans-serif; }
        .nav-eficacia { background: white; border-bottom: 2px solid var(--eficacia-azul); position: sticky; top: 0; z-index: 100; }
        .glass-panel { background: white; border: 1px solid #E2E8F0; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); transition: 0.3s; }
        .glass-panel:hover { border-color: var(--eficacia-azul); transform: translateY(-3px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-eficacia { background: var(--eficacia-azul); color: white; border-radius: 12px; transition: 0.3s; }
        .btn-eficacia:hover { background: var(--eficacia-celeste); box-shadow: 0 5px 15px rgba(0,85,164,0.3); }
    </style>
</head>
<body>

    <nav class="nav-eficacia px-10 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-12">
            <span class="text-3xl font-black tracking-tighter uppercase text-[#0055A4]">eficacia</span>
            <div class="flex gap-8 text-sm font-bold uppercase tracking-widest">
                <button onclick="switchTab('global')" class="hover:text-[#0055A4] transition border-b-2 border-transparent hover:border-[#0055A4] pb-1">Eficacia (Global)</button>
                <button onclick="switchTab('individual')" class="hover:text-[#0055A4] transition border-b-2 border-transparent hover:border-[#0055A4] pb-1">Dashboard (Analizador)</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-200 uppercase">Status: Científico 1.0</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <section id="global" class="tab-content active">
            <div class="mb-10 text-center">
                <h1 class="text-4xl font-black text-slate-800">Análisis General del Dataset</h1>
                <p class="text-slate-500">Perspectiva macro de los 651 archivos de visión artificial.</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="glass-panel p-8 text-center border-l-8 border-[#0055A4]">
                    <i class="bi bi-images text-3xl text-[#0055A4] mb-2"></i>
                    <p class="text-xs font-bold text-slate-400 uppercase">Volumen Datos</p>
                    <h2 class="text-4xl font-bold">15,064 <span class="text-lg">items</span></h2>
                </div>
                </div>
        </section>

        <section id="individual" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                
                <div class="glass-panel p-8">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="bi bi-folder-fill text-[#0055A4]"></i> Selección de Imagen
                    </h3>
                    <div class="border-2 border-dashed border-slate-200 rounded-2xl p-10 text-center hover:border-[#4A90E2] transition cursor-pointer mb-6">
                        <input type="file" id="fileInput" class="hidden" onchange="previewImage(event)">
                        <label for="fileInput" class="cursor-pointer">
                            <i class="bi bi-cloud-arrow-up text-5xl text-slate-300"></i>
                            <p class="mt-4 text-slate-500 font-medium">Click para buscar imagen en tu equipo</p>
                        </label>
                    </div>
                    <div id="previewContainer" class="hidden">
                        <img id="imagePreview" src="#" class="w-full rounded-xl shadow-lg border">
                    </div>
                </div>

                <div class="glass-panel p-8 bg-[#F1F5F9]">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="bi bi-cpu-fill text-[#0055A4]"></i> EDA Científico Avanzado
                    </h3>
                    <div id="edaResults" class="space-y-4">
                        <p class="text-slate-400 italic">Selecciona una imagen para realizar el análisis de píxeles y textura...</p>
                    </div>
                    
                    <button class="btn-eficacia w-full py-4 mt-8 font-bold text-sm uppercase tracking-widest">
                        Analizar con IA (Ollama)
                    </button>
                </div>

            </div>
        </section>

    </main>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('imagePreview');
                output.src = reader.result;
                document.getElementById('previewContainer').classList.remove('hidden');
                
                // Simulación de resultados de EDA Científico
                document.getElementById('edaResults').innerHTML = `
                    <div class="flex justify-between p-3 bg-white rounded-lg shadow-sm">
                        <span class="font-bold">Entropía de Imagen:</span> <span class="text-blue-600 font-mono">7.42 bits/pixel</span>
                    </div>
                    <div class="flex justify-between p-3 bg-white rounded-lg shadow-sm">
                        <span class="font-bold">Contraste (Std Dev):</span> <span class="text-blue-600 font-mono">48.12</span>
                    </div>
                    <div class="flex justify-between p-3 bg-white rounded-lg shadow-sm">
                        <span class="font-bold">Nivel de Ruido:</span> <span class="text-red-500 font-mono">Bajo (12.4 var)</span>
                    </div>
                `;
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
